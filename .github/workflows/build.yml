name: ViEdit Build & Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Versiyon'
        required: true
        default: '2.0.0'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: FFmpeg İndir
        run: |
          New-Item -ItemType Directory -Force -Path "ffmpeg-bin\win32"
          Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -OutFile "ffmpeg.zip"
          Expand-Archive -Path "ffmpeg.zip" -DestinationPath "ffmpeg-temp"
          Copy-Item "ffmpeg-temp\*\bin\ffmpeg.exe" "ffmpeg-bin\win32\ffmpeg.exe"
          Copy-Item "ffmpeg-temp\*\bin\ffprobe.exe" "ffmpeg-bin\win32\ffprobe.exe"
        shell: powershell

      - name: Bağımlılıkları Yükle
        run: npm install

      - name: Windows Build
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Artifact Yükle
        uses: actions/upload-artifact@v4
        with:
          name: ViEdit-v2-Windows-Setup
          path: dist/*.exe
          retention-days: 30

name: ViEdit Build & Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Versiyon'
        required: true
        default: '1.0.0'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: ViEdit-Windows-Setup
          path: dist/*.exe
          retention-days: 30
